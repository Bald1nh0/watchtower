name: Release (Production)

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump strategy for manual releases
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      custom_tag:
        description: Optional explicit tag to release, for example v1.7.2
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GO_VERSION: '1.26.1'
  IMAGE_DESCRIPTION: 'A process for automating Docker container base image updates.'
  IMAGE_SOURCE: 'https://github.com/Bald1nh0/watchtower'
  IMAGE_URL: 'https://bald1nh0.github.io/watchtower/'
  INITIAL_RELEASE_TAG: ${{ vars.INITIAL_RELEASE_TAG != '' && vars.INITIAL_RELEASE_TAG || 'v1.7.1' }}
  INITIAL_RELEASE_REF: ${{ vars.INITIAL_RELEASE_REF != '' && vars.INITIAL_RELEASE_REF || 'a047c7f9ff11813f930f6998863fa1b8a015985c' }}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      release_ref: ${{ steps.prepare.outputs.release_ref }}
      release_version: ${{ steps.prepare.outputs.release_version }}
      release_type: ${{ steps.prepare.outputs.release_type }}
      previous_tag: ${{ steps.prepare.outputs.previous_tag }}
      changelog: ${{ steps.prepare.outputs.changelog }}
      release_reason: ${{ steps.prepare.outputs.release_reason }}
      created_tag: ${{ steps.prepare.outputs.created_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Configure Git identity
        if: ${{ github.ref_type != 'tag' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare release tag
        id: prepare
        env:
          RELEASE_BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'auto' }}
          CUSTOM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.custom_tag || '' }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          INITIAL_RELEASE_TAG: ${{ env.INITIAL_RELEASE_TAG }}
          INITIAL_RELEASE_REF: ${{ env.INITIAL_RELEASE_REF }}
        run: bash scripts/prepare-release.sh
      - name: Notify Telegram about queued release
        if: ${{ steps.prepare.outputs.should_release == 'true' && env.TELEGRAM_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          RELEASE_TAG: ${{ steps.prepare.outputs.release_tag }}
          RELEASE_TYPE: ${{ steps.prepare.outputs.release_type }}
          RELEASE_REASON: ${{ steps.prepare.outputs.release_reason }}
          CHANGELOG: ${{ steps.prepare.outputs.changelog }}
        run: |
          CHANGELOG_SNIPPET="$(printf '%s\n' "$CHANGELOG" | head -n 30)"
          MESSAGE="$(cat <<EOF
          watchtower release queued
          Repository: ${{ github.repository }}
          Tag: ${RELEASE_TAG}
          Type: ${RELEASE_TYPE}
          Trigger: ${RELEASE_REASON}

          Changes:
          ${CHANGELOG_SNIPPET}
          EOF
          )"
          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"

  lint:
    name: Lint
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    needs: prepare
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install staticcheck
        run: 'go install honnef.co/go/tools/cmd/staticcheck@latest'
      - name: Run staticcheck
        run: '"$(go env GOPATH)/bin/staticcheck" ./...'

  test:
    name: Test
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    needs: prepare
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Run tests
        run: |
          go test ./... -coverprofile coverage.out

  build:
    name: Build
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    needs:
      - prepare
      - test
      - lint
    env:
      CGO_ENABLED: 0
      TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_ref }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Resolve image name
        run: |
          if [ -n "${GHCR_IMAGE_OVERRIDE}" ]; then
            echo "GHCR_IMAGE=${GHCR_IMAGE_OVERRIDE}" >> "$GITHUB_ENV"
          else
            echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          fi
        env:
          GHCR_IMAGE_OVERRIDE: ${{ vars.GHCR_IMAGE }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - name: Build
        uses: goreleaser/goreleaser-action@7ec5c2b0c6cdda6e8bbb49444bc797dd33d74dd8 #v3
        with:
          version: v0.155.0
          args: --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create annotated manifest for version
        run: |
          IMAGE_TAG="$(echo "$TAG" | sed 's#^.*/##' | sed 's/^v*//')"
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.description=${IMAGE_DESCRIPTION}" \
            --annotation "index:org.opencontainers.image.licenses=Apache-2.0" \
            --annotation "index:org.opencontainers.image.source=${IMAGE_SOURCE}" \
            --annotation "index:org.opencontainers.image.title=watchtower" \
            --annotation "index:org.opencontainers.image.url=${IMAGE_URL}" \
            --tag "${GHCR_IMAGE}:${IMAGE_TAG}" \
            "${GHCR_IMAGE}:amd64-${IMAGE_TAG}" \
            "${GHCR_IMAGE}:i386-${IMAGE_TAG}" \
            "${GHCR_IMAGE}:armhf-${IMAGE_TAG}" \
            "${GHCR_IMAGE}:arm64v8-${IMAGE_TAG}"
      - name: Create annotated manifest for latest
        run: |
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.description=${IMAGE_DESCRIPTION}" \
            --annotation "index:org.opencontainers.image.licenses=Apache-2.0" \
            --annotation "index:org.opencontainers.image.source=${IMAGE_SOURCE}" \
            --annotation "index:org.opencontainers.image.title=watchtower" \
            --annotation "index:org.opencontainers.image.url=${IMAGE_URL}" \
            --tag "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}:amd64-latest" \
            "${GHCR_IMAGE}:i386-latest" \
            "${GHCR_IMAGE}:armhf-latest" \
            "${GHCR_IMAGE}:arm64v8-latest"

  notify:
    name: Notify Release Result
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    needs:
      - prepare
      - lint
      - test
      - build
    if: ${{ always() && needs.prepare.outputs.should_release == 'true' }}
    steps:
      - name: Resolve image name
        run: |
          if [ -n "${GHCR_IMAGE_OVERRIDE}" ]; then
            echo "GHCR_IMAGE=${GHCR_IMAGE_OVERRIDE}" >> "$GITHUB_ENV"
          else
            echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          fi
        env:
          GHCR_IMAGE_OVERRIDE: ${{ vars.GHCR_IMAGE }}
      - name: Notify Telegram about release result
        if: ${{ env.TELEGRAM_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          STATUS="success"
          if [ "$LINT_RESULT" != "success" ] || [ "$TEST_RESULT" != "success" ] || [ "$BUILD_RESULT" != "success" ]; then
            STATUS="failed"
          fi

          MESSAGE="$(cat <<EOF
          watchtower release ${STATUS}
          Repository: ${{ github.repository }}
          Tag: ${RELEASE_TAG}
          Release: https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}
          Image: ${GHCR_IMAGE}:${RELEASE_VERSION}
          Lint: ${LINT_RESULT}
          Test: ${TEST_RESULT}
          Build: ${BUILD_RESULT}
          EOF
          )"
          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
