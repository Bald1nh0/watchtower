name: Release (Production)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.20.x'

jobs:
  lint:
    name: Lint
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: dominikh/staticcheck-action@ba605356b4b29a60e87ab9404b712f3461e566dc #v1.3.0
        with:
          version: "2022.1.1"
          install-go: "false" # StaticCheck uses go v1.17 which does not support `any`

  test:
    name: Test
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          go test ./... -coverprofile coverage.out

  build:
    name: Build
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    needs:
      - test
      - lint
    env:
      CGO_ENABLED: 0
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Resolve image name
        run: |
          if [ -n "${GHCR_IMAGE_OVERRIDE}" ]; then
            echo "GHCR_IMAGE=${GHCR_IMAGE_OVERRIDE}" >> "$GITHUB_ENV"
          else
            echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          fi
        env:
          GHCR_IMAGE_OVERRIDE: ${{ vars.GHCR_IMAGE }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - name: Build
        uses: goreleaser/goreleaser-action@7ec5c2b0c6cdda6e8bbb49444bc797dd33d74dd8 #v3
        with:
          version: v0.155.0
          args: --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable experimental docker features
        run: |
          mkdir -p ~/.docker/
          echo '{"experimental": "enabled"}' > ~/.docker/config.json
      - name: Create manifest for version
        run: |
          IMAGE_TAG="$(echo "$TAG" | sed 's#^.*/##' | sed 's/^v*//')"
          docker manifest create \
            "${GHCR_IMAGE}:${IMAGE_TAG}" \
            "${GHCR_IMAGE}:amd64-${IMAGE_TAG}" \
            "${GHCR_IMAGE}:i386-${IMAGE_TAG}" \
            "${GHCR_IMAGE}:armhf-${IMAGE_TAG}" \
            "${GHCR_IMAGE}:arm64v8-${IMAGE_TAG}"
      - name: Annotate manifest for version
        run: |
          IMAGE_TAG="$(echo "$TAG" | sed 's#^.*/##' | sed 's/^v*//')"
          docker manifest annotate \
            "${GHCR_IMAGE}:${IMAGE_TAG}" \
            "${GHCR_IMAGE}:i386-${IMAGE_TAG}" \
            --os linux \
            --arch 386
          docker manifest annotate \
            "${GHCR_IMAGE}:${IMAGE_TAG}" \
            "${GHCR_IMAGE}:armhf-${IMAGE_TAG}" \
            --os linux \
            --arch arm
          docker manifest annotate \
            "${GHCR_IMAGE}:${IMAGE_TAG}" \
            "${GHCR_IMAGE}:arm64v8-${IMAGE_TAG}" \
            --os linux \
            --arch arm64 \
            --variant v8
      - name: Create manifest for latest
        run: |
          docker manifest create \
            "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}:amd64-latest" \
            "${GHCR_IMAGE}:i386-latest" \
            "${GHCR_IMAGE}:armhf-latest" \
            "${GHCR_IMAGE}:arm64v8-latest"
      - name: Annotate manifest for latest
        run: |
          docker manifest annotate \
            "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}:i386-latest" \
            --os linux \
            --arch 386
          docker manifest annotate \
            "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}:armhf-latest" \
            --os linux \
            --arch arm
          docker manifest annotate \
            "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}:arm64v8-latest" \
            --os linux \
            --arch arm64 \
            --variant v8
      - name: Push manifests to GHCR
        run: |
          IMAGE_TAG="$(echo "$TAG" | sed 's#^.*/##' | sed 's/^v*//')"
          docker manifest push "${GHCR_IMAGE}:${IMAGE_TAG}"
          docker manifest push "${GHCR_IMAGE}:latest"
