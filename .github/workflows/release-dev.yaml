name: Push to main

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GO_VERSION: '1.26.1'
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  IMAGE_DESCRIPTION: 'A process for automating Docker container base image updates.'
  IMAGE_SOURCE: 'https://github.com/Bald1nh0/watchtower'
  IMAGE_URL: 'https://bald1nh0.github.io/watchtower/'

jobs:
  build:
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Build
        run: ./build.sh

  test:
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Test
        run: go test -v -coverprofile coverage.out -covermode atomic ./...
      - name: Publish coverage
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}

  publish:
    needs:
      - build
      - test
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - uses: actions/checkout@v5
      - name: Resolve image name
        run: |
          if [ -n "${GHCR_IMAGE_OVERRIDE}" ]; then
            echo "GHCR_IMAGE=${GHCR_IMAGE_OVERRIDE}" >> "$GITHUB_ENV"
          else
            echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          fi
        env:
          GHCR_IMAGE_OVERRIDE: ${{ vars.GHCR_IMAGE }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - name: Publish to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.dev-self-contained
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.GHCR_IMAGE }}:latest-dev
          labels: |
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
            org.opencontainers.image.title=watchtower
            org.opencontainers.image.url=${{ env.IMAGE_URL }}
          annotations: |
            index:org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            index:org.opencontainers.image.licenses=Apache-2.0
            index:org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
            index:org.opencontainers.image.title=watchtower
            index:org.opencontainers.image.url=${{ env.IMAGE_URL }}
