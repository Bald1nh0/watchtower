name: Push to main

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: '1.20.x'
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  build:
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: ./build.sh

  test:
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test
        run: go test -v -coverprofile coverage.out -covermode atomic ./...
      - name: Publish coverage
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}

  publish:
    needs:
      - build
      - test
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON != '' && vars.RUNNER_LABELS_JSON || '["self-hosted","linux","x64"]') }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image name
        run: |
          if [ -n "${GHCR_IMAGE_OVERRIDE}" ]; then
            echo "GHCR_IMAGE=${GHCR_IMAGE_OVERRIDE}" >> "$GITHUB_ENV"
          else
            echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          fi
        env:
          GHCR_IMAGE_OVERRIDE: ${{ vars.GHCR_IMAGE }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - name: Publish to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/Dockerfile.self-contained
          push: true
          tags: ${{ env.GHCR_IMAGE }}:latest-dev
